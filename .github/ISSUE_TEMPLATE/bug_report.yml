name: Bug report
description: Report reproducible incorrect behavior using synthetic data only.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include real credentials, private source, or unredacted reports. Use SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: CredScope version or commit
      placeholder: dev or commit SHA
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Operating system and architecture
      placeholder: Windows amd64, Linux arm64, macOS arm64
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Include minimal steps and obviously fake identifiers only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed all real credentials, private source, personal data, and unredacted scanner output.
          required: true
