name: Feature request
description: Propose a deterministic, offline-first improvement.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What security-analysis problem should CredScope solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain evidence, confidence, determinism, and security boundaries.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This proposal does not require telemetry, cloud authentication, runtime AI, or executing analyzed repository content.
          required: true
