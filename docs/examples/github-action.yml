name: CredScope

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  credscope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"

      - name: Install pinned Gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Generate redacted Gitleaks JSON
        run: gitleaks git --redact --report-format json --report-path gitleaks.json --exit-code 0 .

      - name: Run CredScope
        id: credscope
        uses: Bavlik/CredScope@v0.2.0
        with:
          path: .
          profile: ci
          gitleaks-report: gitleaks.json
          format: sarif
          output: credscope.sarif
          fail-on: high
          minimum-score: "0"
          no-color: "true"

      - name: Upload SARIF
        if: always() && hashFiles('credscope.sarif') != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: credscope.sarif
