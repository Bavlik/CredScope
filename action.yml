name: CredScope
description: Deterministic offline-first static credential exposure and reachability analysis for Docker Compose and GitHub Actions.
author: Abdallah Alotaibi

branding:
  icon: shield
  color: blue

inputs:
  path:
    description: Repository path to analyze, relative to the checked-out workspace.
    required: false
    default: .
  gitleaks-report:
    description: Optional Gitleaks JSON report path.
    required: false
    default: ""
  gitleaks-path-prefix:
    description: Exact absolute scanner path prefix to strip from Gitleaks finding paths.
    required: false
    default: ""
  profile:
    description: "Environment profile: auto, local, ci, staging, or production."
    required: false
    default: auto
  config:
    description: Optional CredScope configuration file path.
    required: false
    default: ""
  format:
    description: "Report format: terminal, json, sarif, html, or mermaid."
    required: false
    default: sarif
  output:
    description: Report path inside the selected repository root.
    required: false
    default: credscope.sarif
  fail-on:
    description: "Minimum failing severity: none, informational, low, medium, high, or critical."
    required: false
    default: high
  minimum-score:
    description: Minimum score from 0 to 100 considered for threshold evaluation.
    required: false
    default: "0"
  verbose:
    description: Include additional secret-safe evidence.
    required: false
    default: "false"
  no-color:
    description: Disable ANSI color output.
    required: false
    default: "true"

outputs:
  report-path:
    description: The configured report path, empty when output was directed to stdout.
    value: ${{ steps.run.outputs.report-path }}
  highest-score:
    description: Highest risk score.
    value: ${{ steps.run.outputs.highest-score }}
  highest-severity:
    description: Highest analyzed severity, or none for an empty result.
    value: ${{ steps.run.outputs.highest-severity }}
  credentials-analyzed:
    description: Number of analyzed credential or configuration items.
    value: ${{ steps.run.outputs.credentials-analyzed }}
  threshold-exceeded:
    description: Whether CredScope returned threshold exit code 1.
    value: ${{ steps.run.outputs.threshold-exceeded }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: true
        cache-dependency-path: ${{ github.action_path }}/go.sum

    - name: Build and run CredScope
      id: run
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_GITLEAKS_REPORT: ${{ inputs.gitleaks-report }}
        INPUT_GITLEAKS_PATH_PREFIX: ${{ inputs.gitleaks-path-prefix }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_MINIMUM_SCORE: ${{ inputs.minimum-score }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_NO_COLOR: ${{ inputs.no-color }}
        GOFLAGS: -mod=readonly
      run: go run ./cmd/credscope-action
